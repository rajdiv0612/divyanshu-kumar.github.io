<style>
    .project-header {
        cursor: pointer;
    }
    .project-details {
        max-height: 0;
        overflow: hidden;
        transition: max-height 0.2s ease-out;
    }
    .project-details.expanded {
        max-height: 200px; /* or any max height you expect */
    }
    .expand-icon {
        margin-left: 10px;
    }
</style>

<div class="project-card">
    <div class="project-header" onclick="toggleProject(this)">
        Project Title <span class="expand-icon">▼</span>
    </div>
    <div class="project-details">
        <div class="project-domain">Domain: tech</div>
        <div class="project-company-tag">Company: XYZ</div>
        <div class="tech-pill">Technologies: HTML, CSS, JS</div>
        <div class="project-points">Points: 5</div>
    </div>
</div>

<script>
function toggleProject(element) {
    const projectDetails = element.nextElementSibling;
    const icon = element.querySelector('.expand-icon');
    projectDetails.classList.toggle('expanded');
    if (projectDetails.classList.contains('expanded')) {
        icon.textContent = '▲';
    } else {
        icon.textContent = '▼';
    }
}
</script>

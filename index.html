<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio</title>
    <link rel="stylesheet" href="styles.css">
    <script src="script.js" defer></script>
</head>
<body>
    <header>
        <h1>My Projects</h1>
    </header>
    <main>
        <section id="projects">
            <div class="project-card">
                <h2 class="project-header toggle-details">Project Title 1</h2>
                <div class="project-details" style="display:none;">
                    <p>Details about Project 1</p>
                </div>
            </div>
            <div class="project-card">
                <h2 class="project-header toggle-details">Project Title 2</h2>
                <div class="project-details" style="display:none;">
                    <p>Details about Project 2</p>
                </div>
            </div>
            <div class="project-card">
                <h2 class="project-header toggle-details">Project Title 3</h2>
                <div class="project-details" style="display:none;">
                    <p>Details about Project 3</p>
                </div>
            </div>
        </section>
    </main>
    <script>
        document.querySelectorAll('.toggle-details').forEach(header => {
            header.addEventListener('click', () => {
                const details = header.nextElementSibling;
                if (details.style.display === "none" || details.style.display === "") {
                    details.style.display = "block";
                } else {
                    details.style.display = "none";
                }
            });
        });
    <\/script>
</body>
</html>
